<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Corner ornament with spiral and floral motifs -->
  <defs>
    <style>
      .ornament-burgundy { fill: #8B2332; }
      .ornament-gold { fill: #D4A574; }
      .ornament-forest { fill: #2C5F2D; }
      .ornament-stroke { fill: none; stroke: #D4A574; stroke-width: 2; }
    </style>
  </defs>

  <!-- Outer spiral frame -->
  <path class="ornament-gold" d="M 10,10 C 10,10 5,10 5,15 L 5,75 C 5,75 5,80 10,80 L 70,80 C 70,80 75,80 75,75 L 75,15 C 75,15 75,10 70,10 Z" />
  <path class="ornament-burgundy" d="M 15,15 C 15,15 12,15 12,18 L 12,72 C 12,72 12,75 15,75 L 65,75 C 65,75 68,75 68,72 L 68,18 C 68,18 68,15 65,15 Z" />

  <!-- Inner spiral decoration in corners -->
  <!-- Top-left spiral -->
  <path class="ornament-forest" d="M 20,20 C 20,18 21,17 23,17 C 25,17 26,18 26,20 C 26,22 25,23 23,23 C 22,23 21,22 21,21" />
  <path class="ornament-stroke" d="M 20,20 C 20,18 21,17 23,17 C 25,17 26,18 26,20 C 26,22 25,23 23,23 C 22,23 21,22 21,21" />

  <!-- Top-right spiral -->
  <path class="ornament-forest" d="M 60,20 C 60,18 59,17 57,17 C 55,17 54,18 54,20 C 54,22 55,23 57,23 C 58,23 59,22 59,21" />
  <path class="ornament-stroke" d="M 60,20 C 60,18 59,17 57,17 C 55,17 54,18 54,20 C 54,22 55,23 57,23 C 58,23 59,22 59,21" />

  <!-- Bottom-left spiral -->
  <path class="ornament-forest" d="M 20,60 C 20,58 21,57 23,57 C 25,57 26,58 26,60 C 26,62 25,63 23,63 C 22,63 21,62 21,61" />
  <path class="ornament-stroke" d="M 20,60 C 20,58 21,57 23,57 C 25,57 26,58 26,60 C 26,62 25,63 23,63 C 22,63 21,62 21,61" />

  <!-- Bottom-right spiral -->
  <path class="ornament-forest" d="M 60,60 C 60,58 59,57 57,57 C 55,57 54,58 54,60 C 54,62 55,63 57,63 C 58,63 59,62 59,61" />
  <path class="ornament-stroke" d="M 60,60 C 60,58 59,57 57,57 C 55,57 54,58 54,60 C 54,62 55,63 57,63 C 58,63 59,62 59,61" />

  <!-- Center floral motif -->
  <circle class="ornament-gold" cx="40" cy="40" r="12" />
  <circle class="ornament-burgundy" cx="40" cy="40" r="8" />

  <!-- Petal decorations -->
  <ellipse class="ornament-forest" cx="40" cy="28" rx="4" ry="6" />
  <ellipse class="ornament-forest" cx="40" cy="52" rx="4" ry="6" />
  <ellipse class="ornament-forest" cx="28" cy="40" rx="6" ry="4" />
  <ellipse class="ornament-forest" cx="52" cy="40" rx="6" ry="4" />
</svg>
